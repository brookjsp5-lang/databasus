server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml application/wasm;

    # API proxy
    location /api {
        proxy_pass http://api:6001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket proxy
    location /ws {
        proxy_pass http://api:6001/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Gracefully handle stale Vite dev-server requests from cached IDE webviews.
    location = /@vite/client {
        default_type application/javascript;
        return 200 "export const createHotContext=()=>({on(){},off(){},send(){}}); export const injectQuery=(url)=>url; export const updateStyle=()=>{}; export const removeStyle=()=>{}; export default {};";
    }

    location = /src/main.tsx {
        default_type application/javascript;
        return 200 "window.location.replace('/');";
    }

    location ^~ /src/ {
        default_type application/javascript;
        return 200 "window.location.replace('/');";
    }

    location ^~ /node_modules/ {
        return 404;
    }

    # Static assets with proper MIME types - HIGH PRIORITY
    location ~* \.(js|mjs|cjs)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        default_type application/javascript;
        try_files $uri =404;
    }

    location ~* \.(css)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        default_type text/css;
        try_files $uri =404;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|wasm)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback - ONLY for non-file requests
    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
